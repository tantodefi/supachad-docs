name: deploy-docs

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write

concurrency:
  group: pages-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install mkdocs-material "pymdown-extensions>=10"
      - run: mkdocs build --strict --site-dir site

      - name: Deploy to Cloudflare Pages
        id: deploy
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=supachad-docs --branch=${{ github.head_ref || github.ref_name }}

      - if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site
