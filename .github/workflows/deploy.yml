name: deploy-docs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install mkdocs-material "pymdown-extensions>=10"
      - run: mkdocs build --strict --site-dir site
      - uses: actions/upload-artifact@v4
        with:
          name: site
          path: site
